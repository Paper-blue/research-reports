<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>调研报告 · Research Reports</title>
<style>
  :root{--bg:#0d1117;--bg2:#161b22;--border:#2d3748;--text:#e6edf3;--muted:#8b949e;--dim:#6e7681;--accent:#58a6ff;--accent2:#7ee787;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:radial-gradient(ellipse at top,#1a2230,#0d1117 55%);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Segoe UI,sans-serif;
    line-height:1.7;min-height:100vh;padding:0 22px 80px;}
  .wrap{max-width:820px;margin:0 auto;}
  header{text-align:center;padding:72px 0 40px;border-bottom:1px solid var(--border);margin-bottom:40px;}
  .kicker{color:var(--accent);font-size:13px;letter-spacing:3px;text-transform:uppercase;font-weight:600;}
  h1{font-size:clamp(28px,5vw,44px);font-weight:800;margin:14px 0 10px;letter-spacing:-.5px;
    background:linear-gradient(90deg,#fff,#9fc7ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  header p{color:var(--muted);max-width:560px;margin:0 auto;}
  .list{display:grid;gap:14px;}
  a.card{display:block;background:var(--bg2);border:1px solid var(--border);border-radius:14px;
    padding:22px 24px;text-decoration:none;color:inherit;transition:transform .15s,border-color .15s;position:relative;overflow:hidden;}
  a.card::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:var(--accent);}
  a.card:hover{transform:translateY(-3px);border-color:var(--accent);}
  a.card .date{font-size:12px;color:var(--dim);letter-spacing:1px;}
  a.card h2{font-size:19px;margin:6px 0;}
  a.card .desc{color:var(--muted);font-size:14px;}
  a.card .tags{margin-top:12px;display:flex;gap:7px;flex-wrap:wrap;}
  .tag{font-size:11.5px;color:var(--accent2);background:rgba(126,231,135,.12);padding:3px 10px;border-radius:999px;}
  footer{text-align:center;color:var(--dim);font-size:12.5px;margin-top:56px;}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="kicker">Research Reports</div>
      <h1>调研报告</h1>
      <p>不定期产出的深度调研与产业地图,基于多源交叉验证。中立视角,可溯源。</p>
    </header>

    <!-- ====== 报告列表:每加一篇,复制下面一个 <a class="card"> 块即可 ====== -->
    <div class="list">

      <a class="card" href="reports/ai-trading-industry-map.html">
        <div class="date">2026-05-30</div>
        <h2>AI 赋能股票交易 / 投资 — 全球产业地图</h2>
        <p class="desc">把"用 AI 赋能股票交易"拆成可对比的产业地图:六大赛道 × 技术路线 × 信息来源 × 目标用户。参照样本:同花顺 AI 助手。</p>
        <div class="tags"><span class="tag">AI 投资</span><span class="tag">FinLLM</span><span class="tag">LLM-Agent</span><span class="tag">产业调研</span></div>
      </a>

    </div>
    <!-- ====== 列表结束 ====== -->

    <footer>
      方法:deep-research(多源搜索 → 抓取 → 对抗式验证 → 带引用综合)· 托管于 Cloudflare Pages,git push 自动部署
    </footer>
  </div>
</body>
</html>
